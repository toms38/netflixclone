<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Netflix Clone</title>

</head>
<body>
    <header id="header">
        <div id="maindiv">    
            <div id="logo">
                <img src="images/Netflix_Logo_PMS.png" alt="" height="70px">
            </div>

            <div>
                <button id="signin">Sign In</button>
            </div>
        </div>    
    </header>
    <main>
        <div id="outerdiv">
         <div>
            <h1>Unlimited movies,TV <br>
                shows, and more</h1> 
            <p>Starts at Rs 250.Cancel Ayntime</p>
         </div>
         <h3>Ready to watch? Enter your email to create or restart your membership.</h3>
       
         <div>
            <input type="email" name="Email address" id="input" placeholder="Email address">
            <button id="startbtn">Get Started ></button>
         </div>
        </div>
    </main>



</body>
</html>
